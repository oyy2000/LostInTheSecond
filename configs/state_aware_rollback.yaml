# State-aware late rollback configuration
# Used by scripts/16_0 through 16_4.

model_id: "meta-llama/Llama-3.2-3B-Instruct"
dataset: "gsm8k"
gpus: "0,1,2,3,4,5,6,7"

# data
n_sample: 0          # 0 = full dataset
seed: 42

# draft settings
n_drafts: 4
K: 4                 # per-draft budget: 1 greedy + (K-1) suffixes

# rollback point selection
betas: [0.4, 0.5, 0.6]
rollback_methods: ["argmax", "max_drop"]

# probe training (16_1)
probe_layers: [8, 16, 24, 28]
probe_test_frac: 0.2
probe_max_samples: 1000

# composite grid search (16_3)
composite_val_frac: 0.2

# generation
temperature: 0.7
top_p: 0.95
max_tokens: 2048

# vLLM
gpu_memory_utilization: 0.92
max_model_len: 4096
