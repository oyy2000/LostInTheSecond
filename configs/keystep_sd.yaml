small_model: "Qwen/Qwen2.5-3B-Instruct"
large_model: "Qwen/Qwen2.5-7B-Instruct"
dataset: "gsm8k"

trigger:
  w_uncertainty: 0.4
  w_position: 0.2
  w_consistency: 0.3
  w_stall: 0.1
  tau: 0.5
  n_max: 10

acceptance:
  alpha_lm_consistency: 0.4
  beta_prefix_compat: 0.3
  gamma_followability: 0.3
  a_min: 0.5

generation:
  temperature: 0.7
  top_p: 0.9
  max_tokens: 1024
  max_steps: 15
  system_prompt: "Please reason step by step, and put your final answer within \\boxed{}."
  stop_tokens:
    - "<|im_end|>"
    - "<|endoftext|>"

oracle:
  n_continuations: 8

gpus: "0,1,2,3,4,5,6,7"
gpu_memory_utilization: 0.90
max_model_len: 2048
